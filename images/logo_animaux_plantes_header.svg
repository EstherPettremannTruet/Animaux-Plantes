  <text x="118" y="76" font-size="14" font-weight="400" letter-spacing="3" style="fill:rgb(255, 183, 229);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:Verdana, Geneva, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">&amp;</text>
  <text x="132" y="76" font-size="26" font-weight="700" letter-spacing="2" style="fill:rgb(255, 183, 229);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Verdana, Geneva, sans-serif;font-size:26px;font-weight:700;text-anchor:start;dominant-baseline:auto">PLANTES</text>

